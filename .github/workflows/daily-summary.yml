name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'        # 08:00 Beijing = 00:00 UTC
  workflow_dispatch:             # Manual trigger for testing

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Push commits back to repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Set date variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run Horizon
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 24

      - name: Generate topic analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com
          ANALYSIS_MODEL: deepseek-v4-pro
          DATE: ${{ env.DATE }}
          TZ: Asia/Shanghai
        run: python3 scripts/analyze_topics.py

      - name: Commit generated files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Horizon Bot"
          git config user.email "horizon-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/summaries/ docs/_posts/ -f
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily Report: ${{ env.DATE }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
